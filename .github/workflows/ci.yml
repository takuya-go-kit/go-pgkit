name: CI
on:
  push:
    branches: [main, master]
    paths: ['backend/go-pgkit/**']
  pull_request:
    paths: ['backend/go-pgkit/**']
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: Vet and test
        working-directory: backend/go-pgkit
        run: |
          go mod download
          go vet ./...
          go test -race ./...
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: backend/go-pgkit
          version: latest
